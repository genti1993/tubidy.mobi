<!DOCTYPE html>
<html lang="sq">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tubidy ju lejon të shkarkoni dhe të dëgjoni muzikë dhe video falas. Shijoni muzikë MP3 320kbps and video MP4 të cilësisë së lartë.">
    <meta name="robots" content="index, follow">
    <title>Tubidy - Shkarkime MP3 & MP4 | Muzikë dhe Video Falas Online</title>
    
    <!-- Lidhja me Stilet -->
    <link rel="stylesheet" href="styles.css">

    <!-- Kodi për Modalitetin e Errët (Dark Mode) -->
    <script>
      if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    </script>
  </head>
  <body>
    <header style="text-align: center; padding: 20px;">
      <img src="https://tubidy.llc" alt="Tubidy Logo" class="logo" style="max-width: 150px;">
      <h1>Kërko Muzikë dhe Video</h1>
    </header>

    <main style="max-width: 600px; margin: 0 auto; padding: 15px; font-family: Arial, sans-serif;">
      
      <!-- Fusha e Kërkimit -->
      <form id="searchForm" class="search-form" style="display: flex; gap: 10px; margin-bottom: 20px;">
        <input type="text" id="searchInput" placeholder="Shkruaj artistin ose këngën..." required autocomplete="off" class="search-input" style="flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
        <button type="submit" class="search-button" style="background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">Kërko</button>
      </form>

      <!-- PLAYER-I I NDREQUR -->
      <div id="resultsSection" style="margin: 20px 0; text-align: center; padding: 15px; border: 1px solid #ccc; background: #f4f4f4; border-radius: 8px;">
        <h4 id="resultsTitle" style="margin-bottom: 12px; color: #333; font-size: 16px;">Duke luajtur: Marin - Naten</h4>
        <div style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 5px; background: #000;">
          <!-- Këtu injektohet lojtari zyrtar i YouTube nga JavaScript -->
          <div id="youtube-audio-player" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></div>
        </div>
      </div>

      <h2>Rezultatet e kërkimit</h2>
      <h3>🔥 Këngët më të dëgjuara (Trending)</h3>

      <!-- Lista ku do të shfaqen këngët trending dhe ato të kërkimit -->
      <div id="resultsList" class="song-list"></div>

    </main>

    <!-- Lidhja me skedarin JavaScript -->
    <script src="script.js"></script>
  </body>
</html>
